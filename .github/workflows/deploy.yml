name: Build and Deploy Pitch Site

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build on GitHub, Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack and install pnpm 10.4.1
        run: |
          corepack enable
          corepack prepare pnpm@10.4.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (Vite) and server (esbuild)
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Copy compiled dist/ to Hostinger via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          source: "dist/"
          target: "/home/u263512999/domains/pitch.codexyield.com/nodejs/"
          overwrite: true

      - name: Restart lsnode process on Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            touch /home/u263512999/domains/pitch.codexyield.com/nodejs/tmp/restart.txt
            echo "Pitch Site restarted at $(date)"
